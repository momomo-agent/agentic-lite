<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockScope — 多维度智能选股</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg:#0a0a0f; --surface:#12131a; --surface2:#1a1b25; --border:#222335; --text:#e0e0e8; --muted:#6b6b80; --accent:#6366f1; --green:#22c55e; --red:#ef4444; --yellow:#eab308; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .header { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:17px; font-weight:600; }
    .header h1 span { color:var(--accent); }
    .market-tabs { display:flex; gap:3px; background:var(--surface); border-radius:7px; padding:3px; }
    .market-tab { padding:5px 14px; border-radius:5px; font-size:12px; cursor:pointer; border:none; background:none; color:var(--muted); transition:all .2s; }
    .market-tab.active { background:var(--accent); color:#fff; }
    .market-tab:hover:not(.active) { color:var(--text); }
    .main { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 57px); }
    .panel-left { border-right:1px solid var(--border); overflow-y:auto; padding:16px; }
    .stitle { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:16px 0 8px; }
    .stitle:first-child { margin-top:0; }
    .dim-group { display:flex; flex-direction:column; gap:5px; }
    .dim-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:6px; background:var(--surface); cursor:pointer; font-size:12px; }
    .dim-item:hover { background:var(--surface2); }
    .dim-item input { accent-color:var(--accent); width:14px; height:14px; }
    .dim-item .icon { font-size:15px; }
    .stock-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; outline:none; margin-top:10px; }
    .stock-input:focus { border-color:var(--accent); }
    .stock-input::placeholder { color:var(--muted); }
    .btn { width:100%; padding:9px; border:none; border-radius:6px; background:var(--accent); color:#fff; font-size:13px; font-weight:500; cursor:pointer; margin-top:12px; }
    .btn:hover { opacity:.9; } .btn:disabled { opacity:.4; cursor:not-allowed; }
    .key-group { margin-top:14px; }
    .key-group label { font-size:10px; color:var(--muted); display:block; margin-bottom:4px; }
    .key-group input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:7px 10px; color:var(--text); font-size:11px; outline:none; font-family:monospace; }
    .panel-right { overflow-y:auto; padding:24px; }
    .status { padding:8px 14px; background:var(--surface); border-radius:6px; font-size:12px; color:var(--muted); margin-bottom:14px; display:none; align-items:center; gap:8px; }
    .status.on { display:flex; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:p 1.5s infinite; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }
    .chart-box { width:100%; height:400px; background:var(--surface); border-radius:8px; margin-bottom:14px; }
    .chart-sm { height:220px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:14px; }
    .card { background:var(--surface); border-radius:8px; padding:14px; border-left:3px solid var(--muted); }
    .card.buy { border-left-color:var(--green); } .card.sell { border-left-color:var(--red); } .card.hold { border-left-color:var(--yellow); }
    .card .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .card .val { font-size:18px; font-weight:600; margin:3px 0; }
    .card .desc { font-size:11px; color:var(--muted); }
    .card .val.up { color:var(--green); } .card .val.down { color:var(--red); }
    .md { font-size:13px; line-height:1.7; }
    .md p { margin-bottom:10px; } .md h2,.md h3 { margin:12px 0 6px; font-weight:600; }
    .md ul,.md ol { padding-left:18px; margin-bottom:10px; } .md li { margin-bottom:3px; }
    .md strong { color:#fff; }
    .md table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
    .md th { text-align:left; padding:7px 10px; background:var(--surface2); border-bottom:1px solid var(--border); }
    .md td { padding:7px 10px; border-bottom:1px solid var(--border); }
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--muted); }
    .empty .ei { font-size:48px; margin-bottom:12px; opacity:.3; } .empty p { font-size:13px; }
    @media(max-width:768px){ .main{grid-template-columns:1fr;} .panel-left{border-right:none;border-bottom:1px solid var(--border);max-height:40vh;} }
  </style>
</head>
<body>
  <div class="header">
    <h1>📈 Stock<span>Scope</span></h1>
    <div class="market-tabs" id="marketTabs">
      <button class="market-tab active" data-market="us">🇺🇸 美股</button>
      <button class="market-tab" data-market="cn">🇨🇳 A股</button>
      <button class="market-tab" data-market="hk">🇭🇰 港股</button>
      <button class="market-tab" data-market="jp">🇯🇵 日股</button>
      <button class="market-tab" data-market="crypto">₿ 加密货币</button>
    </div>
  </div>

  <div class="main">
    <div class="panel-left">
      <div class="stitle">分析维度</div>
      <div class="dim-group" id="dims">
        <label class="dim-item"><input type="checkbox" checked data-dim="technical"><span class="icon">📊</span><span>技术面 — K线/均线/MACD/RSI/布林带</span></label>
        <label class="dim-item"><input type="checkbox" checked data-dim="fundamental"><span class="icon">📋</span><span>基本面 — PE/PB/ROE/营收/利润</span></label>
        <label class="dim-item"><input type="checkbox" checked data-dim="sentiment"><span class="icon">🧠</span><span>市场情绪 — 新闻/社交媒体/恐贪指数</span></label>
        <label class="dim-item"><input type="checkbox" data-dim="macro"><span class="icon">🌍</span><span>宏观经济 — 利率/通胀/GDP/政策</span></label>
        <label class="dim-item"><input type="checkbox" data-dim="flow"><span class="icon">💰</span><span>资金流向 — 主力/北向/融资融券</span></label>
        <label class="dim-item"><input type="checkbox" data-dim="sector"><span class="icon">🏭</span><span>行业对比 — 板块轮动/同业排名</span></label>
        <label class="dim-item"><input type="checkbox" data-dim="risk"><span class="icon">⚠️</span><span>风险评估 — 波动率/最大回撤/VaR</span></label>
      </div>

      <div class="stitle">股票 / 指数</div>
      <input class="stock-input" id="stockInput" placeholder="输入股票代码或名称，如 AAPL、腾讯、茅台..." />

      <button class="btn" id="analyzeBtn" onclick="analyze()">🔍 开始分析</button>

      <div class="key-group">
        <label>LLM API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." />
      </div>
      <div class="key-group">
        <label>Search API Key (Tavily)</label>
        <input id="searchKey" type="password" placeholder="tvly-..." />
      </div>
      <div class="key-group" style="margin-top:8px">
        <label>Provider</label>
        <select id="provider" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>
    </div>

    <div class="panel-right" id="results">
      <div class="empty" id="emptyState">
        <div class="ei">📈</div>
        <p>选择分析维度，输入股票代码，开始多维度分析</p>
        <p style="margin-top:6px;font-size:11px;color:var(--muted)">AI 将从技术面、基本面、情绪面等多个维度分析，给出买卖建议和依据</p>
      </div>
    </div>
  </div>

<script>
const MARKET_NAMES = { us:'美股', cn:'A股', hk:'港股', jp:'日股', crypto:'加密货币' };
const MARKET_EXAMPLES = { us:'AAPL, NVDA, TSLA', cn:'贵州茅台, 宁德时代, 比亚迪', hk:'腾讯, 美团, 阿里巴巴', jp:'丰田, 索尼, 任天堂', crypto:'BTC, ETH, SOL' };
let currentMarket = 'us';

// Market tab switching
document.getElementById('marketTabs').addEventListener('click', e => {
  const tab = e.target.closest('.market-tab');
  if (!tab) return;
  document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentMarket = tab.dataset.market;
  document.getElementById('stockInput').placeholder = `输入代码或名称，如 ${MARKET_EXAMPLES[currentMarket]}`;
});

// Load saved keys
['apiKey','searchKey','provider'].forEach(id => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem('ss_'+id);
  if (saved) el.value = saved;
  el.addEventListener('change', () => localStorage.setItem('ss_'+id, el.value));
});

function getSelectedDims() {
  return Array.from(document.querySelectorAll('#dims input:checked')).map(c => c.dataset.dim);
}

const DIM_PROMPTS = {
  technical: '技术分析：分析K线形态、5/10/20/60日均线趋势、MACD金叉死叉、RSI超买超卖、布林带位置、成交量变化。给出具体数值。',
  fundamental: '基本面分析：分析市盈率PE、市净率PB、ROE、最近4个季度营收和净利润增速、毛利率变化、负债率。和同行业对比。',
  sentiment: '市场情绪分析：搜索最近一周关于该股票的重要新闻、分析师评级变化、社交媒体讨论热度、恐贪指数。',
  macro: '宏观经济分析：当前利率环境、通胀趋势、GDP增长、相关产业政策对该股票的影响。',
  flow: '资金流向分析：主力资金净流入流出、北向资金（A股）或机构持仓变化、融资融券余额变化趋势。',
  sector: '行业对比分析：该股票在所属行业中的排名、行业整体估值水平、板块轮动趋势、竞争对手对比。',
  risk: '风险评估：计算近60日波动率、最大回撤、VaR(95%)、Beta系数。评估当前持仓风险等级。'
};

async function analyze() {
  const stock = document.getElementById('stockInput').value.trim();
  if (!stock) return alert('请输入股票代码或名称');
  const apiKey = document.getElementById('apiKey').value.trim();
  const searchKey = document.getElementById('searchKey').value.trim();
  if (!apiKey) return alert('请输入 API Key');

  const dims = getSelectedDims();
  if (!dims.length) return alert('请至少选择一个分析维度');

  const provider = document.getElementById('provider').value;
  const market = MARKET_NAMES[currentMarket];
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';

  const results = document.getElementById('results');
  results.innerHTML = '';
  document.getElementById('emptyState')?.remove();

  // Status bar
  const statusEl = document.createElement('div');
  statusEl.className = 'status on';
  statusEl.innerHTML = '<div class="dot"></div><span id="statusText">正在启动分析...</span>';
  results.appendChild(statusEl);

  // Build prompt
  const dimInstructions = dims.map(d => DIM_PROMPTS[d]).join('\n\n');
  const prompt = `你是一个专业的${market}股票分析师。请对「${stock}」进行全面的多维度分析。

市场：${market}

请依次完成以下分析维度：

${dimInstructions}

最后，综合以上所有维度，给出：

## 综合评分
给出1-10分的综合评分，以及看多/看空/中性的判断。

## 买入/卖出建议
- 如果建议买入：给出合适的买入价格区间和止损位
- 如果建议卖出：给出目标卖出价格和理由
- 如果建议持有/观望：给出等待的条件

## 关键依据
列出3-5个最重要的决策依据，每个依据引用具体数据。

要求：
1. 所有数据必须标注来源和日期
2. 给出具体数字，不要模糊表述
3. 风险提示必须明确
4. 用中文回答
5. 适当使用表格呈现对比数据`;

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        tools: ['search', 'code'],
        provider,
        apiKey,
        searchApiKey: searchKey,
        model: provider === 'anthropic' ? 'claude-sonnet-4-20250514' : 'gpt-4o',
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullAnswer = '';

    // Create answer container
    const answerEl = document.createElement('div');
    answerEl.className = 'md';
    results.appendChild(answerEl);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          const event = line.slice(7);
          const dataLine = lines[lines.indexOf(line) + 1];
          if (!dataLine?.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(dataLine.slice(6));
            if (event === 'status') {
              document.getElementById('statusText').textContent = data.message;
            } else if (event === 'token') {
              fullAnswer += data.token;
              answerEl.innerHTML = marked.parse(fullAnswer);
            } else if (event === 'done') {
              if (data.answer) {
                fullAnswer = data.answer;
                answerEl.innerHTML = marked.parse(fullAnswer);
              }
              statusEl.classList.remove('on');
              // Try to render charts from code results
              if (data.codeResults?.length) {
                renderCharts(data.codeResults, results);
              }
            } else if (event === 'error') {
              answerEl.innerHTML = `<p style="color:var(--red)">❌ ${data.message}</p>`;
              statusEl.classList.remove('on');
            }
          } catch {}
        }
        // Handle SSE format: data lines directly
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.token) {
              fullAnswer += data.token;
              answerEl.innerHTML = marked.parse(fullAnswer);
            }
          } catch {}
        }
      }
    }
    statusEl.classList.remove('on');
  } catch (err) {
    results.innerHTML += `<p style="color:var(--red)">❌ 请求失败: ${err.message}</p>`;
    statusEl.classList.remove('on');
  }

  btn.disabled = false;
  btn.textContent = '🔍 开始分析';
}

function renderCharts(codeResults, container) {
  codeResults.forEach((cr, i) => {
    if (cr.output && cr.output.includes('{')) {
      try {
        const chartData = JSON.parse(cr.output);
        const div = document.createElement('div');
        div.className = 'chart-box';
        div.id = 'chart_' + i;
        container.appendChild(div);
        const chart = echarts.init(div);
        chart.setOption(chartData);
        window.addEventListener('resize', () => chart.resize());
      } catch {}
    }
  });
}

// Enter key
document.getElementById('stockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
