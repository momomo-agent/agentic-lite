<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StockScope — Pro Analysis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{--bg:#080a0f;--surface:#0d1017;--s2:#131720;--s3:#1a1f2e;--s4:#222838;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--text:#e8eaf0;--muted:#8b8fa4;--dim:#555a6e;--accent:#7c6aef;--accent-l:#a78bfa;--accent-s:124,106,239;--green:#22c55e;--green-l:#4ade80;--green-d:rgba(34,197,94,.1);--red:#ef4444;--red-l:#f87171;--red-d:rgba(239,68,68,.1);--yellow:#eab308;--yellow-d:rgba(234,179,8,.1);--blue:#3b82f6;--cyan:#06b6d4;--r:10px;--r2:14px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
::selection{background:rgba(var(--accent-s),.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}::-webkit-scrollbar-track{background:transparent}

.header{height:52px;padding:0 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:9px;display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;letter-spacing:-1px;box-shadow:0 2px 12px rgba(var(--accent-s),.25)}
.logo h1{font-size:15px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.logo h1 b{color:var(--accent-l)}
.logo .ver{font-size:9px;color:var(--dim);font-weight:600;margin-left:4px;padding:2px 6px;background:var(--s3);border-radius:4px}
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:8px;padding:3px}
.tab{padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--dim);transition:all .15s;font-weight:600;font-family:inherit;letter-spacing:.02em}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(var(--accent-s),.3)}.tab:hover:not(.on){color:var(--muted);background:var(--s3)}

.layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 52px)}
.sidebar{border-right:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
.sidebar-top{padding:12px 14px;flex-shrink:0}
.sidebar-scroll{flex:1;overflow-y:auto;min-height:0;padding:0 14px}
.sidebar-bottom{padding:12px 14px;flex-shrink:0;border-top:1px solid var(--border)}

.sec{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin:12px 0 6px;font-weight:700}.sec:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:16px;background:var(--s2);border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;white-space:nowrap;transition:all .15s;color:var(--muted)}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip:has(input:checked){border-color:rgba(var(--accent-s),.4);background:rgba(var(--accent-s),.08);color:var(--accent-l)}.chip input{display:none}

.search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border-color .15s}.search:focus{border-color:rgba(var(--accent-s),.4)}.search::placeholder{color:var(--dim)}
.slist{border:1px solid var(--border);border-radius:8px;background:var(--bg);margin-top:6px}
.scat{padding:4px 10px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-weight:700;background:var(--s2);position:sticky;top:0;z-index:1}
.si{padding:8px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);transition:all .12s}
.si:last-child{border-bottom:none}.si:hover{background:rgba(255,255,255,.02)}.si.on{background:rgba(var(--accent-s),.06);border-left:2px solid var(--accent)}
.si .nm{font-weight:500}.si .cd{color:var(--dim);font-size:10px;font-family:'JetBrains Mono',monospace}
.picked{margin-top:6px;padding:8px 10px;background:rgba(var(--accent-s),.06);border:1px solid rgba(var(--accent-s),.2);border-radius:8px;font-size:12px;display:none;align-items:center;justify-content:space-between;font-weight:600}
.picked.show{display:flex}.picked .x{cursor:pointer;color:var(--dim);font-size:14px}.picked .x:hover{color:var(--red)}

.go{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.02em;box-shadow:0 2px 12px rgba(var(--accent-s),.25)}
.go:hover{filter:brightness(1.1);transform:translateY(-1px)}.go:disabled{opacity:.3;cursor:not-allowed;transform:none}
.cfgd{margin-top:6px}.cfgd summary{font-size:9px;color:var(--dim);cursor:pointer;font-weight:600;letter-spacing:.05em}.cfgd[open] summary{color:var(--muted)}
.cfgd label{font-size:9px;color:var(--dim);display:block;margin:6px 0 2px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.cfgd input,.cfgd select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}.cfgd input:focus{border-color:rgba(var(--accent-s),.4)}

.content{overflow-y:auto;padding:20px 24px;background:var(--bg)}
.status-bar{padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--muted);margin-bottom:16px;display:none;align-items:center;gap:8px}.status-bar.on{display:flex}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pul 1.5s infinite}@keyframes pul{0%,100%{opacity:1}50%{opacity:.15}}
/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 16px;text-align:center;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi .val{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;letter-spacing:-.03em}
.kpi .lbl{font-size:10px;color:var(--dim);margin-top:6px;font-weight:600;letter-spacing:.04em}
.kpi .sub{font-size:11px;margin-top:5px;font-weight:600}
.kpi .hint{font-size:10px;color:var(--muted);margin-top:4px;font-weight:400;line-height:1.4}
.kpi.bull .val{color:var(--green-l)}.kpi.bear .val{color:var(--red-l)}.kpi.neutral .val{color:var(--yellow)}
.kpi.accent{background:linear-gradient(135deg,rgba(var(--accent-s),.08),rgba(6,182,212,.05));border-color:rgba(var(--accent-s),.2)}
.kpi.accent .val{background:linear-gradient(135deg,var(--accent-l),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi.highlight-green{background:var(--green-d);border-color:rgba(34,197,94,.15)}
.kpi.highlight-red{background:var(--red-d);border-color:rgba(239,68,68,.15)}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;min-height:300px}
.chart-card h4{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.02em;margin-bottom:10px}
.chart-box{width:100%;height:260px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.card.full{width:100%}
.card h3{font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card h3 .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sig{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.sig.up{background:var(--green-d);color:var(--green-l)}.sig.dn{background:var(--red-d);color:var(--red-l)}.sig.nt{background:var(--yellow-d);color:var(--yellow)}

.ref-list{list-style:none}.ref-list li{padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:10px;line-height:1.5}.ref-list li:last-child{border-bottom:none}
.ref-list a{color:var(--accent-l);text-decoration:none;font-weight:500;transition:color .15s}.ref-list a:hover{color:var(--cyan)}
.ref-badge{font-size:9px;padding:3px 8px;border-radius:5px;background:var(--s3);color:var(--muted);font-weight:600;flex-shrink:0}

.md{font-size:13.5px;line-height:1.8;color:var(--text)}.md p{margin-bottom:14px}.md h2{font-size:17px;margin:24px 0 12px;font-weight:700;color:#fff}.md h3{font-size:14px;margin:18px 0 8px;font-weight:700;color:#fff}
.md ul,.md ol{padding-left:20px;margin-bottom:14px}.md li{margin-bottom:6px;line-height:1.7}.md strong{color:#fff}
.md table{width:100%;border-collapse:separate;border-spacing:0;margin:14px 0;font-size:12px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.md th{text-align:left;padding:12px 14px;background:var(--s2);border-bottom:2px solid var(--border);font-weight:700;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.md td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px}.md td:nth-child(n+2){font-family:'JetBrains Mono',monospace}
.md tr:last-child td{border-bottom:none}
.md a{color:var(--accent-l);text-decoration:underline;text-decoration-color:rgba(var(--accent-s),.3);text-underline-offset:2px;transition:text-decoration-color .15s}.md a:hover{text-decoration-color:var(--accent-l)}
.md blockquote{border-left:3px solid var(--accent);padding:10px 16px;margin:14px 0;background:var(--s2);border-radius:0 var(--r) var(--r) 0;color:var(--muted)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:var(--dim);text-align:center}
.empty .icon{font-size:48px;margin-bottom:16px;opacity:.12}.empty p{font-size:13px;max-width:320px;line-height:1.6}.empty .sub{font-size:11px;color:var(--dim);margin-top:8px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{max-height:35vh;border-right:none;border-bottom:1px solid var(--border)}.dash{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<div class="logo">
<div class="logo-mark">SS</div>
<h1>Stock<b>Scope</b><span class="ver">PRO</span></h1>
</div>
<div class="tabs" id="tabs">
<button class="tab on" data-m="us">US</button>
<button class="tab" data-m="cn">A股</button>
<button class="tab" data-m="hk">港股</button>
<button class="tab" data-m="jp">日股</button>
<button class="tab" data-m="crypto">CRYPTO</button>
</div>
</div>
<div class="layout">
<div class="sidebar">
<div class="sidebar-top">
<div class="sec">Dimensions</div>
<div class="chips" id="dims">
<label class="chip"><input type="checkbox" checked data-d="technical">📊 技术面</label>
<label class="chip"><input type="checkbox" checked data-d="fundamental">📋 基本面</label>
<label class="chip"><input type="checkbox" checked data-d="sentiment">🧠 情绪</label>
<label class="chip"><input type="checkbox" data-d="macro">🌍 宏观</label>
<label class="chip"><input type="checkbox" data-d="flow">💰 资金流</label>
<label class="chip"><input type="checkbox" data-d="sector">🏭 行业</label>
<label class="chip"><input type="checkbox" data-d="risk">⚠️ 风险</label>
</div>
<div class="sec">Select</div>
<input class="search" id="searchInput" placeholder="Filter..." autocomplete="off"/>
</div>
<div class="sidebar-scroll">
<div class="slist" id="stockList"></div>
</div>
<div class="sidebar-bottom">
<div class="picked" id="selectedStock"><span id="selectedLabel"></span><span class="x" onclick="clearStock()">✕</span></div>
<button class="go" id="analyzeBtn" onclick="analyze()">▶ ANALYZE</button>
<details class="cfgd"><summary>⚙ CONFIG</summary>
<label>Provider</label><select id="provider"><option value="anthropic">Anthropic</option><option value="openai">OpenAI</option></select>
<label>API Key</label><input type="password" id="apiKey" placeholder="sk-..."/>
<label>Base URL</label><input id="baseUrl" placeholder="https://api.anthropic.com"/>
<label>Model</label><input id="model" placeholder="claude-sonnet-4-20250514"/>
<label>Search Key</label><input type="password" id="searchKey" placeholder="tvly-..."/>
</details>
</div>
</div>
<div class="content" id="results">
<div class="empty"><div class="icon">◎</div><p>Select a stock and dimensions to begin multi-factor AI analysis</p><p class="sub">Real-time data search → Multi-dimensional analysis → Charts → Signals</p></div>
</div>
</div>
<script>const S={us:[{c:'科技巨头',i:[{k:'AAPL',n:'Apple'},{k:'MSFT',n:'Microsoft'},{k:'GOOGL',n:'Alphabet'},{k:'AMZN',n:'Amazon'},{k:'NVDA',n:'NVIDIA'},{k:'META',n:'Meta'},{k:'TSLA',n:'Tesla'},{k:'NFLX',n:'Netflix'}]},{c:'半导体',i:[{k:'AMD',n:'AMD'},{k:'INTC',n:'Intel'},{k:'TSM',n:'台积电ADR'},{k:'AVGO',n:'Broadcom'},{k:'QCOM',n:'Qualcomm'},{k:'MU',n:'Micron'},{k:'ASML',n:'ASML'}]},{c:'AI & SaaS',i:[{k:'CRM',n:'Salesforce'},{k:'PLTR',n:'Palantir'},{k:'SNOW',n:'Snowflake'},{k:'NET',n:'Cloudflare'},{k:'SHOP',n:'Shopify'},{k:'SQ',n:'Block'},{k:'COIN',n:'Coinbase'}]},{c:'ETF',i:[{k:'SPY',n:'S&P 500'},{k:'QQQ',n:'Nasdaq 100'},{k:'SOXX',n:'Semiconductor'},{k:'ARKK',n:'ARK Innovation'}]}],cn:[{c:'消费',i:[{k:'600519',n:'贵州茅台'},{k:'000858',n:'五粮液'},{k:'000568',n:'泸州老窖'}]},{c:'新能源',i:[{k:'300750',n:'宁德时代'},{k:'002594',n:'比亚迪'},{k:'601012',n:'隆基绿能'}]},{c:'科技',i:[{k:'002230',n:'科大讯飞'},{k:'300059',n:'东方财富'},{k:'688981',n:'中芯国际'}]},{c:'金融',i:[{k:'601398',n:'工商银行'},{k:'600036',n:'招商银行'},{k:'601318',n:'中国平安'}]},{c:'指数',i:[{k:'000001',n:'上证指数'},{k:'399006',n:'创业板指'},{k:'000300',n:'沪深300'}]}],hk:[{c:'互联网',i:[{k:'0700',n:'腾讯'},{k:'9988',n:'阿里巴巴'},{k:'3690',n:'美团'},{k:'9618',n:'京东'}]},{c:'金融',i:[{k:'0005',n:'汇丰'},{k:'0388',n:'港交所'},{k:'1299',n:'友邦'}]}],jp:[{c:'科技',i:[{k:'7203',n:'丰田'},{k:'6758',n:'索尼'},{k:'7974',n:'任天堂'},{k:'8035',n:'东京电子'}]}],crypto:[{c:'主流',i:[{k:'BTC',n:'Bitcoin'},{k:'ETH',n:'Ethereum'},{k:'SOL',n:'Solana'},{k:'BNB',n:'BNB'}]},{c:'Meme',i:[{k:'DOGE',n:'Dogecoin'},{k:'PEPE',n:'Pepe'}]},{c:'DeFi',i:[{k:'UNI',n:'Uniswap'},{k:'AAVE',n:'Aave'},{k:'LINK',n:'Chainlink'}]}]};
const MN={us:'美股',cn:'A股',hk:'港股',jp:'日股',crypto:'加密货币'};
let mkt='us',sel=null;

document.getElementById('tabs').onclick=e=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');mkt=t.dataset.m;clearStock();document.getElementById('searchInput').value='';render()};
const sEl=document.getElementById('searchInput'),lEl=document.getElementById('stockList');
sEl.oninput=()=>render();

function render(){const cs=S[mkt]||[],q=sEl.value.toLowerCase();let h='';cs.forEach(cat=>{const f=cat.i.filter(s=>s.n.toLowerCase().includes(q)||s.k.toLowerCase().includes(q)||!q);if(!f.length)return;h+='<div class="scat">'+cat.c+'</div>';f.forEach(s=>{const a=sel&&sel.k===s.k?' on':'';h+='<div class="si'+a+'" onclick="pick(\''+s.k+'\',\''+s.n+'\')"><span class="nm">'+s.n+'</span><span class="cd">'+s.k+'</span></div>'})});lEl.innerHTML=h||'<div style="padding:10px;color:var(--dim);font-size:10px">No match</div>'}
render();

function pick(k,n){sel={k,n};document.getElementById('selectedLabel').textContent=n+' ('+k+')';document.getElementById('selectedStock').classList.add('show');render()}
function clearStock(){sel=null;document.getElementById('selectedStock').classList.remove('show');render()}

['apiKey','searchKey','provider','baseUrl','model'].forEach(id=>{const el=document.getElementById(id),v=localStorage.getItem('ss_'+id);if(v)el.value=v;el.onchange=()=>localStorage.setItem('ss_'+id,el.value)});

const DP={
  technical:'技术分析：搜索该股票最新价格和技术指标数据。给出：当前价格、5/10/20/60日均线、MACD(DIF/DEA/柱)、RSI(14)、布林带(上/中/下轨)、KDJ、OBV、成交量变化率。每个指标给出具体数值和买卖信号(buy/sell/neutral)。另外搜索最近30个交易日的收盘价序列。',
  fundamental:'基本面分析：搜索该股票最新财务数据。给出：PE(TTM)、PB、PS、ROE、ROA、营收(最近4季度)、净利润(最近4季度)、毛利率、净利率、负债率、流动比率、自由现金流。同时搜索2-3个同行业竞争对手的PE/ROE/营收增速做对比。',
  sentiment:'市场情绪：搜索最近一周重要新闻、分析师评级(买入/持有/卖出数量)、目标价中位数、恐贪指数、期权隐含波动率IV、Put/Call Ratio、做空比例Short Interest。',
  macro:'宏观经济：搜索当前联邦基金利率、10年期国债收益率、CPI同比、PPI同比、GDP增速、PMI、失业率。分析这些宏观因素对该股票的具体影响。',
  flow:'资金流向：搜索最近5日主力资金净流入、北向资金(A股)/机构持仓变化(美股13F)、融资融券余额变化、大宗交易数据。',
  sector:'行业对比：搜索该股票所属行业ETF近期表现、行业PE中位数、行业内排名(按市值/营收/增速)、板块轮动趋势。',
  risk:'风险量化：计算或搜索：60日历史波动率(annualized)、最大回撤(近1年)、Beta系数、VaR(95%,1day)、Sharpe Ratio、Sortino Ratio。评估风险等级(低/中/高)。'
};

async function analyze(){
  if(!sel)return alert('请先选择股票');
  const ak=document.getElementById('apiKey').value.trim();
  if(!ak)return alert('请输入 API Key');
  const dims=Array.from(document.querySelectorAll('#dims input:checked')).map(c=>c.dataset.d);
  if(!dims.length)return alert('请至少选一个维度');
  const prov=document.getElementById('provider').value,bu=document.getElementById('baseUrl').value.trim(),mdl=document.getElementById('model').value.trim(),sk=document.getElementById('searchKey').value.trim();
  const mn=MN[mkt],stk=sel.n+' ('+sel.k+')';
  const btn=document.getElementById('analyzeBtn');btn.disabled=true;btn.textContent='⏳ ANALYZING...';
  const R=document.getElementById('results');R.innerHTML='';
  const st=document.createElement('div');st.className='status-bar on';st.innerHTML='<div class="pulse"></div><span id="stext">Initializing search...</span>';R.appendChild(st);

  const dimLabels={technical:'技术面',fundamental:'基本面',sentiment:'情绪面',macro:'宏观',flow:'资金流向',sector:'行业',risk:'风险'};
  const dt=dims.map(d=>DP[d]).join('\n\n');
  const prompt=`你是一个量化分析师(Quant Analyst)。请对「${stk}」进行机构级(institutional-grade)多维度分析。

市场：${mn}

请依次完成以下分析维度，每个维度都必须引用搜索到的真实数据：

${dt}

最后给出：

## 综合评分
1-10分综合评分 + 看多/看空/中性判断 + 置信度(高/中/低)

## 交易建议

      for(const ln of lines){

function buildDashboard(container, mdEl, answer, dims, dimLabels, stockName) {

  if (!data) { const sm = answer.match(/(\d+\.?\d*)\s*[\/／]\s*10/); data = { score: sm ? parseFloat(sm[1]) : 7, verdict: answer.includes('看多')||answer.includes('买入') ? 'bullish' : answer.includes('看空') ? 'bearish' : 'neutral' }; }
  container.innerHTML = '';

  const sc = data.score||7, vc = data.verdict==='bullish'?'bull':data.verdict==='bearish'?'bear':'neutral';
  const vt = data.verdict==='bullish'?'📈 BULLISH':data.verdict==='bearish'?'📉 BEARISH':'➡️ NEUTRAL';
  const conf = data.confidence||'medium';
  const p = data.price||{}, t = data.technicals||{}, f = data.fundamentals||{}, r = data.risk||{}, se = data.sentiment||{}, tr = data.trade||{};

  // === KPI Row 1: Core ===
  const scoreHint = sc>=8?'强烈推荐':sc>=6?'值得关注':sc>=4?'谨慎观望':'风险较高';
  const rsiHint = t.rsi>70?'⚠️ 超买区间，回调风险':t.rsi>60?'偏强，接近超买':t.rsi<30?'超卖区间，反弹机会':t.rsi<40?'偏弱，接近超卖':'中性区间';
  let kpi = '<div class="dash">';
  kpi += `<div class="kpi accent"><div class="val">${sc.toFixed(1)}<span style="font-size:14px;opacity:.5">/10</span></div><div class="lbl">综合评分</div><div class="hint">${scoreHint}</div></div>`;
  kpi += `<div class="kpi ${vc}"><div class="val" style="font-size:18px">${vt}</div><div class="lbl">交易信号</div><div class="hint">${data.verdict==='bullish'?'看多，建议买入':data.verdict==='bearish'?'看空，建议卖出':'中性，建议观望'}</div></div>`;
  kpi += `<div class="kpi"><div class="val" style="font-size:22px">${p.current?"$"+p.current.toLocaleString():"—"}</div><div class="lbl">当前价格</div>${p.changePct?`<div class="sub sig ${p.changePct>0?'up':'dn'}">${p.changePct>0?'+':''}${p.changePct}% 今日</div>`:''}${p.high52w?`<div class="hint">52周: ${p.low52w} ~ ${p.high52w}</div>`:''}</div>`;
  kpi += `<div class="kpi"><div class="val" style="font-size:22px">${t.rsi?t.rsi.toFixed(1):"—"}</div><div class="lbl">RSI (14)</div><div class="hint">${rsiHint}</div></div>`;

      ch.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#11121b',borderColor:'#252640',textStyle:{color:'#e4e4ef',fontSize:10}},legend:{data:['Stock','Industry'],textStyle:{color:'#7a7a95',fontSize:9},top:0,right:0},grid:{top:25,bottom:20,left:35,right:10},xAxis:{type:'category',data:cats,axisLabel:{color:'#4a4a62',fontSize:8,fontWeight:600},axisLine:{lineStyle:{color:'#1a1b2a'}}},yAxis:{type:'value',splitLine:{lineStyle:{color:'#1a1b2a'}},axisLabel:{color:'#4a4a62',fontSize:8}},series:[{name:'Stock',type:'bar',data:v1,barWidth:14,itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#818cf8'},{offset:1,color:'#6366f1'}]},borderRadius:[3,3,0,0]}},{name:'Industry',type:'bar',data:v2,barWidth:14,itemStyle:{color:'#252640',borderRadius:[3,3,0,0]}}]});
      window.addEventListener('resize',()=>ch.resize());
    }
    // Revenue/Profit
    const rvE = document.getElementById('ch-rev');
    if (rvE) {
      const ch = echarts.init(rvE);
      const rev = data.revenue4q&&data.revenue4q.some(v=>v)?data.revenue4q:[0,0,0,0];
      const prf = data.profit4q&&data.profit4q.some(v=>v)?data.profit4q:[0,0,0,0];
      const qs = ['Q-4','Q-3','Q-2','Q-1'];
      ch.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#11121b',borderColor:'#252640',textStyle:{color:'#e4e4ef',fontSize:10}},legend:{data:['Revenue','Profit'],textStyle:{color:'#7a7a95',fontSize:9},top:0,right:0},grid:{top:25,bottom:20,left:40,right:10},xAxis:{type:'category',data:qs,axisLabel:{color:'#4a4a62',fontSize:9},axisLine:{lineStyle:{color:'#1a1b2a'}}},yAxis:{type:'value',splitLine:{lineStyle:{color:'#1a1b2a'}},axisLabel:{color:'#4a4a62',fontSize:8}},series:[{name:'Revenue',type:'bar',data:rev,barWidth:16,itemStyle:{color:'#34d399',borderRadius:[3,3,0,0]}},{name:'Profit',type:'line',data:prf,smooth:true,lineStyle:{color:'#818cf8',width:2},symbol:'circle',symbolSize:5,itemStyle:{color:'#818cf8'}}]});
      window.addEventListener('resize',()=>ch.resize());
    }
  }, 150);
}

sEl.onkeydown=e=>{if(e.key==='Enter'&&sel)analyze()};
window.pick=pick;window.clearStock=clearStock;window.analyze=analyze;window.buildDashboard=buildDashboard;
