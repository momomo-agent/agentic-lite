<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StockScope PRO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#09090b;--surface:#111113;--s2:#18181b;--s3:#27272a;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#fafafa;--t2:#d4d4d8;--muted:#a1a1aa;--dim:#71717a;
  --accent:#8b5cf6;--accent2:#a78bfa;
  --green:#22c55e;--green2:#4ade80;--green-bg:rgba(34,197,94,.08);
  --red:#ef4444;--red2:#fca5a5;--red-bg:rgba(239,68,68,.08);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.08);
  --r:8px
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;font-feature-settings:'cv02','cv03','cv04','cv11';-webkit-font-smoothing:antialiased}
::selection{background:rgba(139,92,246,.3)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}::-webkit-scrollbar-track{background:transparent}

.header{height:48px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:grid;place-items:center;font-size:14px;font-weight:700;color:#fff}
.logo h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.tabs{display:flex;gap:1px;background:var(--s2);border-radius:6px;padding:2px}
.tab{padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--dim);transition:all .15s;font-weight:500;font-family:inherit}
.tab.on{background:var(--text);color:var(--bg)}.tab:hover:not(.on){color:var(--muted)}

.layout{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 48px)}
.sidebar{border-right:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
.sidebar-top{padding:12px;flex-shrink:0}
.sidebar-scroll{flex:1;overflow-y:auto;min-height:0;padding:0 12px}
.sidebar-bottom{padding:12px;flex-shrink:0;border-top:1px solid var(--border)}

.sec{font-size:11px;color:var(--dim);margin:10px 0 6px;font-weight:500}.sec:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:4px 10px;border-radius:6px;background:var(--s2);border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;transition:all .12s;color:var(--muted)}
.chip:hover{border-color:var(--border2);color:var(--text)}.chip:has(input:checked){border-color:var(--accent);background:rgba(139,92,246,.08);color:var(--accent2)}.chip input{display:none}

.search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .15s}.search:focus{border-color:var(--accent)}.search::placeholder{color:var(--dim)}
.slist{border:1px solid var(--border);border-radius:6px;background:var(--bg);margin-top:6px}
.scat{padding:4px 10px;font-size:10px;color:var(--dim);font-weight:600;background:var(--s2);position:sticky;top:0;z-index:1}
.si{padding:7px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);transition:background .08s}
.si:last-child{border-bottom:none}.si:hover{background:rgba(255,255,255,.02)}.si.on{background:rgba(139,92,246,.06);border-left:2px solid var(--accent)}
.si .nm{font-weight:500}.si .cd{color:var(--dim);font-size:10px;font-family:'JetBrains Mono',monospace}
.picked{margin-top:6px;padding:7px 10px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:6px;font-size:12px;display:none;align-items:center;justify-content:space-between;font-weight:500}
.picked.show{display:flex}.picked .x{cursor:pointer;color:var(--dim);font-size:13px}.picked .x:hover{color:var(--red)}

.go{width:100%;padding:9px;border:none;border-radius:6px;background:var(--text);color:var(--bg);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.go:hover{opacity:.9}.go:disabled{opacity:.3;cursor:not-allowed}
.cfgd{margin-top:6px}.cfgd summary{font-size:10px;color:var(--dim);cursor:pointer;font-weight:500}.cfgd[open] summary{color:var(--muted)}
.cfgd label{font-size:9px;color:var(--dim);display:block;margin:5px 0 2px;font-weight:500}
.cfgd input,.cfgd select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}.cfgd input:focus{border-color:var(--accent)}

.content{overflow-y:auto;padding:24px 32px;max-width:860px;background:var(--bg)}
.status-bar{padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--muted);margin-bottom:20px;display:none;align-items:center;gap:8px}.status-bar.on{display:flex}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pul 1.5s infinite}@keyframes pul{0%,100%{opacity:1}50%{opacity:.15}}
/* === Hero verdict banner === */
.verdict-banner{padding:20px 24px;border-radius:var(--r);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.verdict-banner.bullish{background:var(--green-bg);border:1px solid rgba(34,197,94,.15)}
.verdict-banner.bearish{background:var(--red-bg);border:1px solid rgba(239,68,68,.15)}
.verdict-banner.neutral{background:var(--yellow-bg);border:1px solid rgba(234,179,8,.15)}
.verdict-main{display:flex;align-items:center;gap:16px}
.verdict-score{font-size:42px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;letter-spacing:-.04em}
.verdict-banner.bullish .verdict-score{color:var(--green2)}
.verdict-banner.bearish .verdict-score{color:var(--red2)}
.verdict-banner.neutral .verdict-score{color:var(--yellow)}
.verdict-info{display:flex;flex-direction:column;gap:2px}
.verdict-label{font-size:20px;font-weight:700;letter-spacing:-.02em}
.verdict-banner.bullish .verdict-label{color:var(--green2)}
.verdict-banner.bearish .verdict-label{color:var(--red2)}
.verdict-banner.neutral .verdict-label{color:var(--yellow)}
.verdict-sub{font-size:12px;color:var(--muted)}
.verdict-price{text-align:right}
.verdict-price .cur{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.03em}
.verdict-price .chg{font-size:13px;font-weight:600;margin-top:2px}

/* === Metrics row === */
.metrics{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.metric{flex:1;padding:14px 16px;background:var(--surface);border-right:1px solid var(--border);text-align:center}
.metric:last-child{border-right:none}
.metric .v{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.metric .k{font-size:10px;color:var(--dim);margin-top:3px;font-weight:500}
.metric .h{font-size:9px;color:var(--muted);margin-top:2px}

/* === Charts inline === */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.chart-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.chart-panel h4{font-size:11px;color:var(--dim);font-weight:600;margin-bottom:8px}
.chart-box{width:100%;height:220px}

/* === Section card === */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.section h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.section h3 .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* === Signals grid === */
.sig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sig-item{padding:10px;border-radius:6px;text-align:center}
.sig-item.buy{background:var(--green-bg)}.sig-item.sell{background:var(--red-bg)}.sig-item.neutral{background:var(--yellow-bg)}
.sig-item .name{font-size:10px;color:var(--dim);margin-bottom:4px;font-weight:500}
.sig-item .signal{font-size:12px;font-weight:700}
.sig-item.buy .signal{color:var(--green2)}.sig-item.sell .signal{color:var(--red2)}.sig-item.neutral .signal{color:var(--yellow)}
.sig-item .bar{height:3px;background:var(--s3);border-radius:2px;margin-top:6px;overflow:hidden}
.sig-item .bar-fill{height:100%;border-radius:2px}
.sig-item.buy .bar-fill{background:var(--green)}.sig-item.sell .bar-fill{background:var(--red)}.sig-item.neutral .bar-fill{background:var(--yellow)}
.sig-item .str{font-size:9px;color:var(--muted);margin-top:3px}

/* === Trade plan === */
.trade-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.trade-cell{background:var(--s2);border-radius:6px;padding:12px 8px;text-align:center}
.trade-cell .v{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}
.trade-cell .k{font-size:9px;color:var(--dim);margin-top:3px}

/* === Sentiment === */
.sent-bar{height:8px;border-radius:4px;display:flex;overflow:hidden;margin-bottom:6px}
.sent-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.sent-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sent-cell{background:var(--s2);border-radius:6px;padding:10px;text-align:center}
.sent-cell .v{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sent-cell .k{font-size:9px;color:var(--dim);margin-top:2px}
.sent-cell .h{font-size:9px;color:var(--muted);margin-top:1px}

/* === Markdown report === */
.md{font-size:14px;line-height:1.8;color:var(--t2)}.md p{margin-bottom:14px}
.md h2{font-size:18px;margin:28px 0 12px;font-weight:700;color:var(--text)}.md h3{font-size:15px;margin:20px 0 8px;font-weight:600;color:var(--text)}
.md ul,.md ol{padding-left:20px;margin-bottom:14px}.md li{margin-bottom:6px}.md strong{color:var(--text)}
.md table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px}
.md th{text-align:left;padding:10px 12px;background:var(--s2);font-weight:600;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border)}
.md td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px}.md td:nth-child(n+2){font-family:'JetBrains Mono',monospace}
.md tr:last-child td{border-bottom:none}
.md a{color:var(--accent2);text-decoration:none}.md a:hover{text-decoration:underline}

/* === References === */
.ref-list{list-style:none}.ref-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px}.ref-list li:last-child{border-bottom:none}
.ref-list a{color:var(--accent2);text-decoration:none;font-weight:500}.ref-list a:hover{text-decoration:underline}
.ref-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--s2);color:var(--dim);font-weight:600;flex-shrink:0}

/* === Misc === */
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
.tag.up{background:var(--green-bg);color:var(--green2)}.tag.dn{background:var(--red-bg);color:var(--red2)}.tag.nt{background:var(--yellow-bg);color:var(--yellow)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:var(--dim);text-align:center}
.empty .icon{font-size:40px;margin-bottom:12px;opacity:.1;font-weight:200}.empty p{font-size:13px;max-width:300px;line-height:1.6}.empty .sub{font-size:11px;color:var(--dim);margin-top:6px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{max-height:35vh;border-right:none;border-bottom:1px solid var(--border)}.metrics{flex-wrap:wrap}.metric{min-width:25%}.chart-row{grid-template-columns:1fr}.sig-grid{grid-template-columns:repeat(2,1fr)}.trade-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="header">
<div class="logo">
<div class="logo-mark">S</div>
<h1>StockScope</h1>
</div>
<div class="tabs" id="tabs">
<button class="tab on" data-m="us">US</button>
<button class="tab" data-m="cn">A股</button>
<button class="tab" data-m="hk">港股</button>
<button class="tab" data-m="jp">日股</button>
<button class="tab" data-m="crypto">Crypto</button>
</div>
</div>
<div class="layout">
<div class="sidebar">
<div class="sidebar-top">
<div class="sec">分析维度</div>
<div class="chips" id="dims">
<label class="chip"><input type="checkbox" checked data-d="technical">技术面</label>
<label class="chip"><input type="checkbox" checked data-d="fundamental">基本面</label>
<label class="chip"><input type="checkbox" checked data-d="sentiment">情绪</label>
<label class="chip"><input type="checkbox" data-d="macro">宏观</label>
<label class="chip"><input type="checkbox" data-d="flow">资金流</label>
<label class="chip"><input type="checkbox" data-d="sector">行业</label>
<label class="chip"><input type="checkbox" data-d="risk">风险</label>
</div>
<div class="sec">选择标的</div>
<input class="search" id="searchInput" placeholder="搜索股票..." autocomplete="off"/>
</div>
<div class="sidebar-scroll">
<div class="slist" id="stockList"></div>
</div>
<div class="sidebar-bottom">
<div class="picked" id="selectedStock"><span id="selectedLabel"></span><span class="x" onclick="clearStock()">✕</span></div>
<button class="go" id="analyzeBtn" onclick="analyze()">开始分析</button>
<details class="cfgd"><summary>设置</summary>
<label>Provider</label><select id="provider"><option value="anthropic">Anthropic</option><option value="openai">OpenAI</option></select>
<label>API Key</label><input type="password" id="apiKey" placeholder="sk-..."/>
<label>Base URL</label><input id="baseUrl" placeholder="https://api.anthropic.com"/>
<label>Model</label><input id="model" placeholder="claude-sonnet-4-20250514"/>
<label>Search Key</label><input type="password" id="searchKey" placeholder="tvly-..."/>
</details>
</div>
</div>
<div class="content" id="results">
<div class="empty"><div class="icon">◎</div><p>选择一支股票开始 AI 多维分析</p><p class="sub">实时搜索 → 多维度分析 → 可视化图表 → 交易信号</p></div>
</div>
</div>
<script>const S={us:[{c:'科技巨头',i:[{k:'AAPL',n:'Apple'},{k:'MSFT',n:'Microsoft'},{k:'GOOGL',n:'Alphabet'},{k:'AMZN',n:'Amazon'},{k:'NVDA',n:'NVIDIA'},{k:'META',n:'Meta'},{k:'TSLA',n:'Tesla'},{k:'NFLX',n:'Netflix'}]},{c:'半导体',i:[{k:'AMD',n:'AMD'},{k:'INTC',n:'Intel'},{k:'TSM',n:'台积电ADR'},{k:'AVGO',n:'Broadcom'},{k:'QCOM',n:'Qualcomm'},{k:'MU',n:'Micron'},{k:'ASML',n:'ASML'}]},{c:'AI & SaaS',i:[{k:'CRM',n:'Salesforce'},{k:'PLTR',n:'Palantir'},{k:'SNOW',n:'Snowflake'},{k:'NET',n:'Cloudflare'},{k:'SHOP',n:'Shopify'},{k:'SQ',n:'Block'},{k:'COIN',n:'Coinbase'}]},{c:'ETF',i:[{k:'SPY',n:'S&P 500'},{k:'QQQ',n:'Nasdaq 100'},{k:'SOXX',n:'Semiconductor'},{k:'ARKK',n:'ARK Innovation'}]}],cn:[{c:'消费',i:[{k:'600519',n:'贵州茅台'},{k:'000858',n:'五粮液'},{k:'000568',n:'泸州老窖'}]},{c:'新能源',i:[{k:'300750',n:'宁德时代'},{k:'002594',n:'比亚迪'},{k:'601012',n:'隆基绿能'}]},{c:'科技',i:[{k:'002230',n:'科大讯飞'},{k:'300059',n:'东方财富'},{k:'688981',n:'中芯国际'}]},{c:'金融',i:[{k:'601398',n:'工商银行'},{k:'600036',n:'招商银行'},{k:'601318',n:'中国平安'}]},{c:'指数',i:[{k:'000001',n:'上证指数'},{k:'399006',n:'创业板指'},{k:'000300',n:'沪深300'}]}],hk:[{c:'互联网',i:[{k:'0700',n:'腾讯'},{k:'9988',n:'阿里巴巴'},{k:'3690',n:'美团'},{k:'9618',n:'京东'}]},{c:'金融',i:[{k:'0005',n:'汇丰'},{k:'0388',n:'港交所'},{k:'1299',n:'友邦'}]}],jp:[{c:'科技',i:[{k:'7203',n:'丰田'},{k:'6758',n:'索尼'},{k:'7974',n:'任天堂'},{k:'8035',n:'东京电子'}]}],crypto:[{c:'主流',i:[{k:'BTC',n:'Bitcoin'},{k:'ETH',n:'Ethereum'},{k:'SOL',n:'Solana'},{k:'BNB',n:'BNB'}]},{c:'Meme',i:[{k:'DOGE',n:'Dogecoin'},{k:'PEPE',n:'Pepe'}]},{c:'DeFi',i:[{k:'UNI',n:'Uniswap'},{k:'AAVE',n:'Aave'},{k:'LINK',n:'Chainlink'}]}]};
const MN={us:'美股',cn:'A股',hk:'港股',jp:'日股',crypto:'加密货币'};
let mkt='us',sel=null;

document.getElementById('tabs').onclick=e=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');mkt=t.dataset.m;clearStock();document.getElementById('searchInput').value='';render()};
const sEl=document.getElementById('searchInput'),lEl=document.getElementById('stockList');
sEl.oninput=()=>render();

function render(){const cs=S[mkt]||[],q=sEl.value.toLowerCase();let h='';cs.forEach(cat=>{const f=cat.i.filter(s=>s.n.toLowerCase().includes(q)||s.k.toLowerCase().includes(q)||!q);if(!f.length)return;h+='<div class="scat">'+cat.c+'</div>';f.forEach(s=>{const a=sel&&sel.k===s.k?' on':'';h+='<div class="si'+a+'" onclick="pick(\''+s.k+'\',\''+s.n+'\')"><span class="nm">'+s.n+'</span><span class="cd">'+s.k+'</span></div>'})});lEl.innerHTML=h||'<div style="padding:10px;color:var(--dim);font-size:10px">No match</div>'}
render();

function pick(k,n){sel={k,n};document.getElementById('selectedLabel').textContent=n+' ('+k+')';document.getElementById('selectedStock').classList.add('show');render()}
function clearStock(){sel=null;document.getElementById('selectedStock').classList.remove('show');render()}

['apiKey','searchKey','provider','baseUrl','model'].forEach(id=>{const el=document.getElementById(id),v=localStorage.getItem('ss_'+id);if(v)el.value=v;el.onchange=()=>localStorage.setItem('ss_'+id,el.value)});

const DP={
  technical:'技术分析：搜索该股票最新价格和技术指标数据。给出：当前价格、5/10/20/60日均线、MACD(DIF/DEA/柱)、RSI(14)、布林带(上/中/下轨)、KDJ、OBV、成交量变化率。每个指标给出具体数值和买卖信号(buy/sell/neutral)。另外搜索最近30个交易日的收盘价序列。',
  fundamental:'基本面分析：搜索该股票最新财务数据。给出：PE(TTM)、PB、PS、ROE、ROA、营收(最近4季度)、净利润(最近4季度)、毛利率、净利率、负债率、流动比率、自由现金流。同时搜索2-3个同行业竞争对手的PE/ROE/营收增速做对比。',
  sentiment:'市场情绪：搜索最近一周重要新闻、分析师评级(买入/持有/卖出数量)、目标价中位数、恐贪指数、期权隐含波动率IV、Put/Call Ratio、做空比例Short Interest。',
  macro:'宏观经济：搜索当前联邦基金利率、10年期国债收益率、CPI同比、PPI同比、GDP增速、PMI、失业率。分析这些宏观因素对该股票的具体影响。',
  flow:'资金流向：搜索最近5日主力资金净流入、北向资金(A股)/机构持仓变化(美股13F)、融资融券余额变化、大宗交易数据。',
  sector:'行业对比：搜索该股票所属行业ETF近期表现、行业PE中位数、行业内排名(按市值/营收/增速)、板块轮动趋势。',
  risk:'风险量化：计算或搜索：60日历史波动率(annualized)、最大回撤(近1年)、Beta系数、VaR(95%,1day)、Sharpe Ratio、Sortino Ratio。评估风险等级(低/中/高)。'
};

async function analyze(){
  if(!sel)return alert('请先选择股票');
  const ak=document.getElementById('apiKey').value.trim();

  const body={prompt,tools:['search','code'],provider:prov,apiKey:ak,searchApiKey:sk};
  if(bu)body.baseUrl=bu;
  body.model=mdl||(prov==='anthropic'?'claude-sonnet-4-20250514':'gpt-4o');

  try{
    const res=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok)throw new Error('HTTP '+res.status+': '+(await res.text()));
    const reader=res.body.getReader(),dec=new TextDecoder();
    let buf='',answer='',evType=null;
    const mdEl=document.createElement('div');mdEl.className='md';mdEl.style.display='none';R.appendChild(mdEl);

    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const ln of lines){
        if(ln.startsWith('event: ')){evType=ln.slice(7).trim()}
        else if(ln.startsWith('data: ')&&evType){
          try{
            const d=JSON.parse(ln.slice(6));
            if(evType==='status')document.getElementById('stext').textContent=d.message;
            else if(evType==='token'){answer+=d.text}
            else if(evType==='tool')document.getElementById('stext').textContent='🔧 '+d.name;
            else if(evType==='done'){if(d.answer)answer=d.answer;st.classList.remove('on');buildDashboard(R,mdEl,answer,dims,dimLabels,stk)}
            else if(evType==='error'){R.innerHTML+='<div class="section" style="border-color:var(--red)"><p style="color:var(--red-l)">'+d.message+'</p></div>';st.classList.remove('on')}
          }catch(pe){}
          evType=null;
        }
      }
    }
    st.classList.remove('on');
    if(answer&&!document.querySelector('.verdict-banner'))buildDashboard(R,mdEl,answer,dims,dimLabels,stk);
  }catch(e){
    R.innerHTML+='<div class="section" style="border-color:var(--red)"><p style="color:var(--red-l)">'+e.message+'</p></div>';
    st.classList.remove('on');

function buildDashboard(container, mdEl, answer, dims, dimLabels, stockName) {
  let data = null;
  const jm = answer.match(/<chart-data>\s*([\s\S]*?)\s*<\/chart-data>/);
  if (jm) { try { data = JSON.parse(jm[1]); } catch(e) {} answer = answer.replace(/<chart-data>[\s\S]*<\/chart-data>/, '').trim(); }
  if (!data) { const sm = answer.match(/(\d+\.?\d*)\s*[\/／]\s*10/); data = { score: sm ? parseFloat(sm[1]) : 7, verdict: answer.includes('看多')||answer.includes('买入') ? 'bullish' : answer.includes('看空') ? 'bearish' : 'neutral' }; }
  container.innerHTML = '';
  const sc = data.score||7, p = data.price||{}, t = data.technicals||{}, f = data.fundamentals||{}, r = data.risk||{}, se = data.sentiment||{}, tr = data.trade||{};
  const vClass = data.verdict||'neutral';
  const vLabel = vClass==='bullish'?'看多 · BULLISH':vClass==='bearish'?'看空 · BEARISH':'中性 · NEUTRAL';
  const scoreDesc = sc>=8?'强烈推荐':sc>=6?'值得关注':sc>=4?'谨慎观望':'风险较高';

  // === 1. Verdict Banner ===
  let h = `<div class="verdict-banner ${vClass}">
    <div class="verdict-main">
      <div class="verdict-score">${sc.toFixed(1)}</div>
      <div class="verdict-info">
        <div class="verdict-label">${vLabel}</div>
        <div class="verdict-sub">${scoreDesc} · ${stockName}</div>
      </div>
    </div>
    <div class="verdict-price">
      <div class="cur">${p.current?("$"+p.current.toLocaleString()):'—'}</div>
      ${p.changePct?`<div class="chg" style="color:${p.changePct>0?'var(--green2)':'var(--red2)'}">${p.changePct>0?'+':''}${p.changePct}%</div>`:''}
    </div>
  </div>`;

  // === 2. Key Metrics Row ===
  const rsiHint = t.rsi>70?'超买':t.rsi>60?'偏强':t.rsi<30?'超卖':t.rsi<40?'偏弱':'中性';
  h += '<div class="metrics">';
  h += `<div class="metric"><div class="v">${t.rsi?t.rsi.toFixed(1):'—'}</div><div class="k">RSI</div><div class="h">${t.rsi?rsiHint:''}</div></div>`;
  h += `<div class="metric"><div class="v">${f.pe?f.pe.toFixed(1)+'x':'—'}</div><div class="k">PE</div><div class="h">${f.pe?(data.industry?.pe?'行业 '+data.industry.pe.toFixed(1)+'x':''):'—'}</div></div>`;
  h += `<div class="metric"><div class="v">${f.roe?f.roe.toFixed(1)+'%':'—'}</div><div class="k">ROE</div></div>`;
  h += `<div class="metric"><div class="v">${r.beta?r.beta.toFixed(2):'—'}</div><div class="k">Beta</div><div class="h">${r.beta?(r.beta>1.5?'高波动':''):'—'}</div></div>`;
  h += `<div class="metric"><div class="v">${r.sharpe?r.sharpe.toFixed(2):'—'}</div><div class="k">Sharpe</div></div>`;
  h += `<div class="metric"><div class="v" style="color:var(--red2)">${r.maxDrawdown?'-'+r.maxDrawdown.toFixed(1)+'%':'—'}</div><div class="k">回撤</div></div>`;
  h += '</div>';
  const el = document.createElement('div'); el.innerHTML = h; container.appendChild(el);

  // === 3. Charts Row ===
  const cr = document.createElement('div'); cr.className = 'chart-row';
  const cp1 = document.createElement('div'); cp1.className = 'chart-panel';
  cp1.innerHTML = '<h4>价格走势 (30D)</h4><div class="chart-box" id="ch-price"></div>';
  cr.appendChild(cp1);
  const cp2 = document.createElement('div'); cp2.className = 'chart-panel';
  cp2.innerHTML = '<h4>多因子评分</h4><div class="chart-box" id="ch-radar"></div>';
  cr.appendChild(cp2);
  container.appendChild(cr);

  const cr2 = document.createElement('div'); cr2.className = 'chart-row';
  const cp3 = document.createElement('div'); cp3.className = 'chart-panel';
  cp3.innerHTML = '<h4>基本面 vs 行业</h4><div class="chart-box" id="ch-fund"></div>';
  cr2.appendChild(cp3);
  const cp4 = document.createElement('div'); cp4.className = 'chart-panel';
  cp4.innerHTML = '<h4>营收 & 利润 (4Q)</h4><div class="chart-box" id="ch-rev"></div>';
  cr2.appendChild(cp4);
  container.appendChild(cr2);

  // === 4. Signals ===
  if (data.signals && data.signals.length) {
    const sec = document.createElement('div'); sec.className = 'section';
    let sh = '<h3><span class="dot" style="background:var(--accent)"></span>技术信号</h3><div class="sig-grid">';
    data.signals.forEach(s => {
      const cls = s.signal==='buy'?'buy':s.signal==='sell'?'sell':'neutral';
      const txt = s.signal==='buy'?'买入':s.signal==='sell'?'卖出':'持有';
      const str = s.strength||50;
      sh += `<div class="sig-item ${cls}"><div class="name">${s.name}</div><div class="signal">${txt}</div><div class="bar"><div class="bar-fill" style="width:${str}%"></div></div><div class="str">${str}%</div></div>`;
    });
    sh += '</div>'; sec.innerHTML = sh; container.appendChild(sec);
  }

  // === 5. Trade Plan ===
  if (tr.direction) {
    const sec = document.createElement('div'); sec.className = 'section';
    const dirCls = tr.direction==='buy'?'up':tr.direction==='sell'?'dn':'nt';
    const dirTxt = tr.direction==='buy'?'买入':tr.direction==='sell'?'卖出':'观望';
    sec.innerHTML = `<h3><span class="dot" style="background:var(--green)"></span>交易计划</h3>
      <div class="trade-grid">
        <div class="trade-cell"><div class="v"><span class="tag ${dirCls}">${dirTxt}</span></div><div class="k">方向</div></div>
        <div class="trade-cell"><div class="v">${tr.entry?("$"+tr.entry[0]+" – $"+tr.entry[1]):"—"}</div><div class="k">入场</div></div>
        <div class="trade-cell"><div class="v" style="color:var(--red2)">${tr.stop?("$"+tr.stop):"—"}</div><div class="k">止损</div></div>
        <div class="trade-cell"><div class="v" style="color:var(--green2)">${tr.target1?("$"+tr.target1):"—"}</div><div class="k">目标</div></div>
        <div class="trade-cell"><div class="v">${tr.position?(tr.position+"%"):"—"}</div><div class="k">仓位</div></div>
        <div class="trade-cell"><div class="v" style="font-family:Inter;font-size:12px">${tr.horizon||"—"}</div><div class="k">周期</div></div>
      </div>`;
    container.appendChild(sec);
  }

  // === 6. Sentiment ===
  if (se.analystBuy||se.fearGreed) {
    const sec = document.createElement('div'); sec.className = 'section';
    const tot = (se.analystBuy||0)+(se.analystHold||0)+(se.analystSell||0)||1;
    const bp = ((se.analystBuy||0)/tot*100).toFixed(0), hp = ((se.analystHold||0)/tot*100).toFixed(0), sp = ((se.analystSell||0)/tot*100).toFixed(0);
    const fgl = se.fearGreed>75?'极度贪婪':se.fearGreed>55?'贪婪':se.fearGreed>45?'中性':se.fearGreed>25?'恐惧':'极度恐惧';
    sec.innerHTML = `<h3><span class="dot" style="background:var(--yellow)"></span>市场情绪</h3>
      <div class="sent-bar"><div style="width:${bp}%;background:var(--green)"></div><div style="width:${hp}%;background:var(--yellow)"></div><div style="width:${sp}%;background:var(--red)"></div></div>
      <div class="sent-row"><span style="color:var(--green2)">买入 ${se.analystBuy||0}</span><span style="color:var(--yellow)">持有 ${se.analystHold||0}</span><span style="color:var(--red2)">卖出 ${se.analystSell||0}</span></div>
      ${se.targetPrice?`<div style="font-size:12px;margin-bottom:8px">目标价 <span style="font-family:'JetBrains Mono';font-weight:600">${se.targetPrice}</span></div>`:''}
      <div class="sent-metrics">
        ${se.fearGreed?`<div class="sent-cell"><div class="v">${se.fearGreed}</div><div class="k">恐贪指数</div><div class="h">${fgl}</div></div>`:''}
        ${se.putCallRatio?`<div class="sent-cell"><div class="v">${se.putCallRatio}</div><div class="k">Put/Call</div><div class="h">${se.putCallRatio>1?'偏空':se.putCallRatio>0.7?'中性':'偏多'}</div></div>`:''}
        ${se.iv?`<div class="sent-cell"><div class="v">${se.iv}%</div><div class="k">隐含波动率</div></div>`:''}
        ${se.shortInterest?`<div class="sent-cell"><div class="v">${se.shortInterest}%</div><div class="k">做空比例</div></div>`:''}
      </div>`;
    container.appendChild(sec);
  }

  // === 7. Analysis Report ===
  const rpt = document.createElement('div'); rpt.className = 'section';
  rpt.innerHTML = '<h3><span class="dot" style="background:var(--accent2)"></span>分析报告</h3><div class="md">' + marked.parse(answer) + '</div>';
  container.appendChild(rpt);

  // === 8. References ===
  if (data.sources && data.sources.length) {
    const sec = document.createElement('div'); sec.className = 'section';
    let sh = '<h3><span class="dot" style="background:var(--dim)"></span>参考来源</h3><ul class="ref-list">';
    data.sources.forEach(s => { sh += `<li><span class="ref-badge">${s.type||'web'}</span><a href="${s.url}" target="_blank">${s.title}</a></li>`; });
    sh += '</ul>'; sec.innerHTML = sh; container.appendChild(sec);
  }

  // === ECharts ===
  setTimeout(() => {
    const gridColor = '#27272a';
    const labelColor = '#71717a';
    const tooltipStyle = {backgroundColor:'#18181b',borderColor:'#27272a',textStyle:{color:'#d4d4d8',fontSize:11}};
    // Price
    const pE = document.getElementById('ch-price');
    if (pE) {
      const ch = echarts.init(pE);
      const ph = data.priceHistory && data.priceHistory.length > 3 ? data.priceHistory : null;
      if (ph) {
        ch.setOption({backgroundColor:'transparent',tooltip:{...tooltipStyle,trigger:'axis'},grid:{top:15,bottom:25,left:50,right:10},xAxis:{type:'category',data:ph.map((_,i)=>'D-'+(ph.length-1-i)),axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false},axisTick:{show:false}},yAxis:{type:'value',scale:true,splitLine:{lineStyle:{color:gridColor}},axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false}},series:[{type:'line',data:ph,smooth:.3,lineStyle:{color:'#8b5cf6',width:2},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(139,92,246,.15)'},{offset:1,color:'rgba(139,92,246,0)'}]}},symbol:'none'}]});
        window.addEventListener('resize',()=>ch.resize());
      }
    }
    // Radar
    const rE = document.getElementById('ch-radar');
    if (rE && data.dims) {
      const ch = echarts.init(rE);
      const ind = dims.map(d => ({ name: dimLabels[d]||d, max: 10 }));
      const vals = dims.map(d => data.dims[d] || (sc + (Math.random()-0.5)*2));
      ch.setOption({backgroundColor:'transparent',radar:{indicator:ind,shape:'polygon',splitNumber:4,radius:'65%',center:['50%','52%'],axisName:{color:labelColor,fontSize:10,fontWeight:500},splitLine:{lineStyle:{color:gridColor}},splitArea:{show:false},axisLine:{lineStyle:{color:gridColor}}},series:[{type:'radar',data:[{value:vals.map(v=>+v.toFixed(1)),areaStyle:{color:'rgba(139,92,246,.1)'},lineStyle:{color:'#8b5cf6',width:2},itemStyle:{color:'#8b5cf6'},symbol:'circle',symbolSize:4}]}]});
      window.addEventListener('resize',()=>ch.resize());
    }
    // Fundamentals
    const fE = document.getElementById('ch-fund');
    if (fE && (f.pe || f.roe)) {
      const ch = echarts.init(fE);
      const ind2 = data.industry||{};
      const cats=['PE','PB','ROE','营收增速','利润增速','毛利率'];
      const v1=[f.pe||0,f.pb||0,f.roe||0,f.revenueGrowth||0,f.profitGrowth||0,f.grossMargin||0];
      const v2=[ind2.pe||0,0,ind2.roe||0,ind2.revenueGrowth||0,0,0];
      ch.setOption({backgroundColor:'transparent',tooltip:{...tooltipStyle,trigger:'axis'},legend:{data:[stockName.split(' ')[0],'行业'],textStyle:{color:labelColor,fontSize:10},top:0,right:0},grid:{top:28,bottom:22,left:40,right:10},xAxis:{type:'category',data:cats,axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false},axisTick:{show:false}},yAxis:{type:'value',splitLine:{lineStyle:{color:gridColor}},axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false}},series:[{name:stockName.split(' ')[0],type:'bar',data:v1,barWidth:16,itemStyle:{color:'#8b5cf6',borderRadius:[3,3,0,0]}},{name:'行业',type:'bar',data:v2,barWidth:16,itemStyle:{color:'#27272a',borderRadius:[3,3,0,0]}}]});
      window.addEventListener('resize',()=>ch.resize());
    }
    // Revenue
    const rvE = document.getElementById('ch-rev');
    if (rvE) {
      const ch = echarts.init(rvE);
      const rev = data.revenue4q&&data.revenue4q.some(v=>v)?data.revenue4q:[0,0,0,0];
      const prf = data.profit4q&&data.profit4q.some(v=>v)?data.profit4q:[0,0,0,0];
      ch.setOption({backgroundColor:'transparent',tooltip:{...tooltipStyle,trigger:'axis'},legend:{data:['营收','利润'],textStyle:{color:labelColor,fontSize:10},top:0,right:0},grid:{top:28,bottom:22,left:45,right:10},xAxis:{type:'category',data:['Q-4','Q-3','Q-2','Q-1'],axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false},axisTick:{show:false}},yAxis:{type:'value',splitLine:{lineStyle:{color:gridColor}},axisLabel:{color:labelColor,fontSize:9},axisLine:{show:false}},series:[{name:'营收',type:'bar',data:rev,barWidth:18,itemStyle:{color:'#22c55e',borderRadius:[3,3,0,0]}},{name:'利润',type:'line',data:prf,smooth:.3,lineStyle:{color:'#8b5cf6',width:2},symbol:'circle',symbolSize:4,itemStyle:{color:'#8b5cf6'}}]});
      window.addEventListener('resize',()=>ch.resize());
    }
  }, 120);
}
